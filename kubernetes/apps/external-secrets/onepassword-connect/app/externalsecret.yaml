---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Rotates Connect credentials after bootstrap. Fields on item "1password":
# OP_CREDENTIALS_JSON, OP_CONNECT_TOKEN (no trailing spaces).
# Credentials JSON is stored raw (not base64); omit b64dec unlike home-ops.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: onepassword-connect-credentials-secret
    template:
      data:
        1password-credentials.json: "{{ .OP_CREDENTIALS_JSON }}"
  dataFrom:
    - extract:
        key: 1password
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: onepassword-connect-vault-secret
    template:
      data:
        OP_CONNECT_TOKEN: "{{ .OP_CONNECT_TOKEN }}"
  dataFrom:
    - extract:
        key: 1password
