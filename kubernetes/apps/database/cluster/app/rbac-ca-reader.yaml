---
# Allow authentik ExternalSecret (kubernetes provider) to read the Postgres server CA.
# SA lives in authentik; Role/RoleBinding are applied into database via Flux targetNamespace
# so we keep Role+RoleBinding here and the SA in the authentik app.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-postgres-ca-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["postgres-server-cert"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-postgres-ca-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-postgres-ca-reader
subjects:
  - kind: ServiceAccount
    name: eso-postgres-ca-reader
    namespace: authentik
