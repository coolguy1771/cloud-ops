---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
# Scraped by Alloy prometheus.operator.podmonitors (enablePodMonitor is deprecated on Cluster).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: postgres
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: postgres-pooler-rw
  labels:
    app.kubernetes.io/name: postgres-pooler-rw
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: postgres-pooler-rw
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: postgres-pooler-ro
  labels:
    app.kubernetes.io/name: postgres-pooler-ro
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: postgres-pooler-ro
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
