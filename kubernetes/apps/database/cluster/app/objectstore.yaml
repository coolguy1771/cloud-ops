---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/barmancloud.cnpg.io/objectstore_v1.json
# Credentials: ExternalSecret -> Secret cnpg-backup (1Password item cnpg-backup).
# CLOUDFLARE_ACCOUNT_ID is substituted by Flux from cloudflare-account-id-secret.
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: postgres-backup
spec:
  retentionPolicy: "30d"
  configuration:
    destinationPath: s3://cnpg-d42c690f/
    endpointURL: https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
    s3Credentials:
      accessKeyId:
        name: cnpg-backup
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
      maxParallel: 2
    data:
      compression: gzip
      jobs: 2
