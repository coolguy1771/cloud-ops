---
# Remap cert-manager CA secrets (tls.crt/tls.key) to CNPG shape (ca.crt/ca.key).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-postgres-ca-sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-postgres-ca-sync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - postgres-server-ca
      - postgres-client-ca
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-postgres-ca-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-postgres-ca-sync
subjects:
  - kind: ServiceAccount
    name: eso-postgres-ca-sync
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/secretstore_v1.json
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-database
spec:
  provider:
    kubernetes:
      remoteNamespace: database
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: database
      auth:
        serviceAccount:
          name: eso-postgres-ca-sync
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-server-ca-cnpg
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: kubernetes-database
  target:
    name: postgres-server-ca-cnpg
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ca.crt: "{{ index . \"tls.crt\" }}"
        ca.key: "{{ index . \"tls.key\" }}"
  data:
    - secretKey: tls.crt
      remoteRef:
        key: postgres-server-ca
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: postgres-server-ca
        property: tls.key
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-client-ca-cnpg
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: kubernetes-database
  target:
    name: postgres-client-ca-cnpg
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ca.crt: "{{ index . \"tls.crt\" }}"
        ca.key: "{{ index . \"tls.key\" }}"
  data:
    - secretKey: tls.crt
      remoteRef:
        key: postgres-client-ca
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: postgres-client-ca
        property: tls.key
