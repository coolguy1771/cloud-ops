---
# cert-manager CA secrets use tls.crt/tls.key. CNPG Poolers need ca.crt/ca.key.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-ca-sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-ca-sync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-ca-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: postgres-ca-sync
subjects:
  - kind: ServiceAccount
    name: postgres-ca-sync
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-ca-sync
data:
  sync.sh: |
    #!/bin/sh
    set -eu
    sync_one() {
      src="$1"
      dst="$2"
      if ! kubectl get secret "$src" >/dev/null 2>&1; then
        echo "secret $src not ready; skip"
        return 0
      fi
      kubectl get secret "$src" -o json > /tmp/src.json
      tls_crt=$(jq -r '.data["tls.crt"] // empty' /tmp/src.json)
      tls_key=$(jq -r '.data["tls.key"] // empty' /tmp/src.json)
      if [ -z "$tls_crt" ] || [ -z "$tls_key" ]; then
        echo "missing tls.crt/tls.key on $src; skip"
        return 0
      fi
      kubectl create secret generic "$dst" \
        --from-literal=ca.crt="$(printf '%s' "$tls_crt" | base64 -d)" \
        --from-literal=ca.key="$(printf '%s' "$tls_key" | base64 -d)" \
        --dry-run=client -o yaml | kubectl apply --server-side -f -
      echo "synced $src -> $dst"
    }
    sync_one postgres-server-ca postgres-server-ca-cnpg
    sync_one postgres-client-ca postgres-client-ca-cnpg
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-ca-sync
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: postgres-ca-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: mirror.gcr.io/bitnami/kubectl:1.33.4
              command: ["/bin/sh", "/scripts/sync.sh"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          volumes:
            - name: scripts
              configMap:
                name: postgres-ca-sync
                defaultMode: 0555
            - name: tmp
              emptyDir: {}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
