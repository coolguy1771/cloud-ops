---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Chart mounts this via authentik.existingSecret (envFrom). Keys must be AUTHENTIK_* env names.
# 1Password item "authentik": secret_key (do not rotate after first install)
# 1Password item "authentik-db": password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        AUTHENTIK_SECRET_KEY: "{{ .secret_key }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .password }}"
  data:
    - secretKey: secret_key
      remoteRef:
        key: authentik
        property: secret_key
    - secretKey: password
      remoteRef:
        key: authentik-db
        property: password
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Sync Postgres server CA from database namespace for verify-full TLS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-ca
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: kubernetes-database
  target:
    name: postgres-ca
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ca.crt: "{{ .ca }}"
  data:
    - secretKey: ca
      remoteRef:
        key: postgres-server-cert
        property: ca.crt
